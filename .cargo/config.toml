# .cargo/config.toml — put this in workspace root

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]  # mold linker: 5-10x faster linking

[target.x86_64-pc-windows-msvc]
# Use lld on Windows for faster linking
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/bin/zld"]  # or use lld

# Cache compiled dependencies across `cargo clean` cycles
[build]
# Uncomment if using sccache:
# rustc-wrapper = "sccache"